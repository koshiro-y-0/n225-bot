name: 日本株Bot - 節目アラート（30分毎）

on:
  # 平日 9:00-16:00 JST に30分おき (= UTC 00:00-07:00)
  schedule:
    - cron: "*/30 0-7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-alert:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 為替アラートチェック
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FOREX_ALERT_THRESHOLD: ${{ secrets.FOREX_ALERT_THRESHOLD }}
        run: python src/ueda/forex_alert.py

      - name: 日経節目アラートチェック
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python -m src.nikkei.nikkei_alert

      - name: 節目状態ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/milestone_state.json || true
          git diff --cached --quiet || git commit -m "data: milestone_state 更新 $(date +%Y-%m-%d_%H:%M)"
          git pull --rebase origin main || true
          git push || true
