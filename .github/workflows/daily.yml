name: 日本株Bot - 定時配信（平日 9:10 JST）

on:
  # 平日 09:10 JST (= UTC 00:10) に起動。
  # 8:30 JST だと yfinance の ^N225 履歴データが Tokyo市場開場(9:00)前で
  # 前日バーが反映されない構造的問題があるため、9:10 まで遅らせている。
  schedule:
    - cron: "10 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: レポートを生成して送信
        env:
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python dispatcher.py

      - name: 日次データCSVをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_indicators.csv
          git diff --cached --quiet || git commit -m "data: $(date +%Y-%m-%d) の日次指標データを保存"
          git push
