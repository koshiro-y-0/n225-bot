name: 日本株Bot - ウィークリーレポート（金曜 15:30 JST）

on:
  # 金曜 15:30 JST (= UTC 06:30)
  schedule:
    - cron: "30 6 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: UedaBot 週間サマリーを生成して送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/ueda/weekly_main.py

      - name: 日経週次レポートを生成して送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m src.nikkei.weekly_report

      - name: チャート画像をコミット・プッシュ
        id: push_chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "コミット対象なし"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: $(date +%Y-%m-%d) 週間チャート画像を保存"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 為替チャート画像をLINEに送信
        if: steps.push_chart.outputs.pushed == 'true'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          FILENAME="chart_weekly_$(TZ=Asia/Tokyo date +%Y%m%d).png"
          if [ ! -f "data/$FILENAME" ]; then
            echo "[INFO] 為替チャート画像($FILENAME)が存在しないためスキップ"
            exit 0
          fi
          sleep 5
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.common.notify import send_line_image
          from src.common.tz import now_jst
          import os
          repo = os.getenv('GITHUB_REPOSITORY', 'koshiro-y-0/n225-bot')
          filename = f'chart_weekly_{now_jst().strftime(\"%Y%m%d\")}.png'
          image_url = f'https://raw.githubusercontent.com/{repo}/main/data/{filename}'
          print(f'[INFO] 画像URL: {image_url}')
          send_line_image(image_url)
          "

      - name: 日経チャート画像をLINEに送信
        if: steps.push_chart.outputs.pushed == 'true'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          FILENAME="nikkei_weekly_$(TZ=Asia/Tokyo date +%Y%m%d).png"
          if [ ! -f "data/$FILENAME" ]; then
            echo "[INFO] 日経チャート画像($FILENAME)が存在しないためスキップ"
            exit 0
          fi
          sleep 3
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.common.notify import send_line_image
          from src.common.tz import now_jst
          import os
          repo = os.getenv('GITHUB_REPOSITORY', 'koshiro-y-0/n225-bot')
          filename = f'nikkei_weekly_{now_jst().strftime(\"%Y%m%d\")}.png'
          image_url = f'https://raw.githubusercontent.com/{repo}/main/data/{filename}'
          print(f'[INFO] 画像URL: {image_url}')
          send_line_image(image_url)
          "
